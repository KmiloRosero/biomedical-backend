# Database (defaults to H2 in-memory so the app can start without external services)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:biomedical_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA — ddl-auto=update creates/updates tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Disable Spring Security for development
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# JSON — return dates as ISO strings not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# Server
server.port=8080
spring.application.name=biomedical-waste-platform

# OpenAI — replace with real key when needed
spring.ai.openai.api-key=your-openai-key-here
spring.ai.openai.chat.options.model=gpt-3.5-turbo
